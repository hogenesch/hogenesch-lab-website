<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Landmark contributions across molecular clock biology, atlas-scale genomics, computational methods, and public resources</title>
  <desc id="desc">A conceptual map showing landmark Hogenesch Lab contributions including the positive clock loop, Gene Atlas, the mammalian circadian transcriptome, the mouse organ atlas, algorithms, CYCLOPS, and CircaDB.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f4e79" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .ring { fill: none; stroke: #d8e6f3; stroke-width: 3; }
      .link { fill: none; stroke: #b8cfe6; stroke-width: 3; stroke-linecap: round; }
      .node { fill: #ffffff; stroke: #dce7f1; stroke-width: 2; filter: url(#shadow); }
      .node-title { fill: #1f4e79; font: 700 26px Inter, Arial, sans-serif; }
      .node-copy { fill: #33404d; font: 400 19px "Source Serif Pro", Georgia, serif; }
      .center-title { fill: #1a1a1a; font: 700 34px Inter, Arial, sans-serif; }
      .center-copy { fill: #5a5f66; font: 400 20px "Source Serif Pro", Georgia, serif; }
      .kicker { fill: #1f4e79; font: 700 14px Inter, Arial, sans-serif; letter-spacing: 0.18em; text-transform: uppercase; }
      .dot { fill: #1f4e79; }
    </style>
  </defs>

  <rect class="bg" width="960" height="720" rx="28"/>
  <circle class="ring" cx="480" cy="360" r="196"/>
  <circle class="ring" cx="480" cy="360" r="262" stroke-dasharray="7 14"/>

  <path class="link" d="M480 214 L480 160"/>
  <path class="link" d="M315 300 L208 252"/>
  <path class="link" d="M315 420 L202 472"/>
  <path class="link" d="M480 506 L480 592"/>
  <path class="link" d="M645 300 L752 252"/>
  <path class="link" d="M645 420 L756 470"/>

  <rect class="node" x="308" y="214" width="344" height="292" rx="26"/>
  <text class="kicker" x="480" y="258" text-anchor="middle">Landmark Contributions</text>
  <text class="center-title" x="480" y="307" text-anchor="middle">A connected body of work</text>
  <text class="center-copy" x="480" y="352" text-anchor="middle">Molecular clock biology</text>
  <text class="center-copy" x="480" y="384" text-anchor="middle">Atlas-scale genomics</text>
  <text class="center-copy" x="480" y="416" text-anchor="middle">Computational methods</text>
  <text class="center-copy" x="480" y="448" text-anchor="middle">Public resources and human timing</text>

  <rect class="node" x="336" y="52" width="288" height="116" rx="22"/>
  <circle class="dot" cx="372" cy="92" r="7"/>
  <text class="node-title" x="392" y="101">Positive clock loop</text>
  <text class="node-copy" x="372" y="132">BMAL1, CLOCK, NPAS2,</text>
  <text class="node-copy" x="372" y="156">and BMAL2</text>

  <rect class="node" x="44" y="184" width="256" height="126" rx="22"/>
  <circle class="dot" cx="80" cy="224" r="7"/>
  <text class="node-title" x="100" y="233">Gene Atlas</text>
  <text class="node-copy" x="80" y="264">Tissue-scale expression maps</text>
  <text class="node-copy" x="80" y="288">across mammalian organs</text>

  <rect class="node" x="36" y="410" width="272" height="138" rx="22"/>
  <circle class="dot" cx="72" cy="450" r="7"/>
  <text class="node-title" x="92" y="459">Circadian transcriptome</text>
  <text class="node-copy" x="72" y="490">Genome-scale temporal profiling</text>
  <text class="node-copy" x="72" y="514">of rhythmic transcription</text>

  <rect class="node" x="332" y="598" width="296" height="92" rx="22"/>
  <circle class="dot" cx="368" cy="638" r="7"/>
  <text class="node-title" x="388" y="647">Mouse organ atlas</text>
  <text class="node-copy" x="368" y="675">Temporal structure across organs</text>

  <rect class="node" x="660" y="188" width="254" height="126" rx="22"/>
  <circle class="dot" cx="696" cy="228" r="7"/>
  <text class="node-title" x="716" y="237">Algorithms</text>
  <text class="node-copy" x="696" y="268">JTK_CYCLE, PSEA,</text>
  <text class="node-copy" x="696" y="292">and MetaCycle</text>

  <rect class="node" x="656" y="408" width="268" height="138" rx="22"/>
  <circle class="dot" cx="692" cy="448" r="7"/>
  <text class="node-title" x="712" y="457">Human circadian ordering</text>
  <text class="node-copy" x="692" y="488">CYCLOPS and CYCLOPS2 for</text>
  <text class="node-copy" x="692" y="512">unordered transcriptomic data</text>

  <rect class="node" x="672" y="586" width="220" height="92" rx="22"/>
  <circle class="dot" cx="708" cy="626" r="7"/>
  <text class="node-title" x="728" y="635">CircaDB</text>
  <text class="node-copy" x="708" y="663">Public circadian data resource</text>
</svg>
