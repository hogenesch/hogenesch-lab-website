<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Landmark contributions across molecular clock biology, atlas-scale genomics, computational methods, and public resources</title>
  <desc id="desc">A minimal contributions map showing six major areas: positive clock loop, Gene Atlas, circadian transcriptome and organ atlas, algorithms, CYCLOPS and CYCLOPS2, and CircaDB.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .frame { fill: none; stroke: #dce7f1; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #dce7f1; stroke-width: 2; }
      .kicker { fill: #1f4e79; font: 700 14px Inter, Arial, sans-serif; letter-spacing: 0.18em; text-transform: uppercase; }
      .title { fill: #1a1a1a; font: 700 34px Inter, Arial, sans-serif; }
      .sub { fill: #5a5f66; font: 400 20px "Source Serif Pro", Georgia, serif; }
      .card-title { fill: #1f4e79; font: 700 24px Inter, Arial, sans-serif; }
      .card-copy { fill: #33404d; font: 400 18px "Source Serif Pro", Georgia, serif; }
      .mark { fill: #1f4e79; }
    </style>
  </defs>

  <rect class="bg" width="960" height="720" rx="28"/>
  <rect class="frame" x="28" y="28" width="904" height="664" rx="24"/>

  <text class="kicker" x="88" y="98">Landmark Contributions</text>
  <text class="title" x="88" y="150">A published body of work</text>
  <text class="sub" x="88" y="190">Clock mechanisms, atlases, computational methods, human ordering, and public resources.</text>

  <rect class="card" x="72" y="242" width="376" height="118" rx="22"/>
  <circle class="mark" cx="106" cy="282" r="7"/>
  <text class="card-title" x="126" y="292">Positive clock loop</text>
  <text class="card-copy" x="106" y="326">BMAL1, CLOCK, NPAS2, and BMAL2</text>

  <rect class="card" x="512" y="242" width="376" height="118" rx="22"/>
  <circle class="mark" cx="546" cy="282" r="7"/>
  <text class="card-title" x="566" y="292">Gene Atlas</text>
  <text class="card-copy" x="546" y="326">Tissue-scale mammalian expression maps</text>

  <rect class="card" x="72" y="392" width="376" height="118" rx="22"/>
  <circle class="mark" cx="106" cy="432" r="7"/>
  <text class="card-title" x="126" y="442">Circadian atlases</text>
  <text class="card-copy" x="106" y="476">Transcriptome profiling and mouse organ atlas</text>

  <rect class="card" x="512" y="392" width="376" height="118" rx="22"/>
  <circle class="mark" cx="546" cy="432" r="7"/>
  <text class="card-title" x="566" y="442">Algorithms</text>
  <text class="card-copy" x="546" y="476">JTK_CYCLE, PSEA, and MetaCycle</text>

  <rect class="card" x="72" y="542" width="376" height="104" rx="22"/>
  <circle class="mark" cx="106" cy="580" r="7"/>
  <text class="card-title" x="126" y="590">Human circadian ordering</text>
  <text class="card-copy" x="106" y="622">CYCLOPS and CYCLOPS2</text>

  <rect class="card" x="512" y="542" width="376" height="104" rx="22"/>
  <circle class="mark" cx="546" cy="580" r="7"/>
  <text class="card-title" x="566" y="590">Public resources</text>
  <text class="card-copy" x="546" y="622">CircaDB and shared circadian data access</text>
</svg>
