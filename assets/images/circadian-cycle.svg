<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" role="img" aria-labelledby="title desc">
  <title id="title">Circadian cycle schematic</title>
  <desc id="desc">A 24-hour clock showing light and dark phases with a rhythmic waveform.</desc>
  <rect width="600" height="420" fill="#fffdf8"/>
  <rect x="0" y="0" width="600" height="420" fill="#f5f1e8"/>
  <circle cx="300" cy="205" r="132" fill="#fffdf8" stroke="#d6cec0" stroke-width="16"/>
  <path d="M300 73 A132 132 0 0 1 432 205" fill="none" stroke="#f0c768" stroke-width="24" stroke-linecap="round"/>
  <path d="M432 205 A132 132 0 0 1 300 337" fill="none" stroke="#8cb8c6" stroke-width="24" stroke-linecap="round"/>
  <path d="M300 337 A132 132 0 0 1 168 205" fill="none" stroke="#355c7d" stroke-width="24" stroke-linecap="round"/>
  <path d="M168 205 A132 132 0 0 1 300 73" fill="none" stroke="#24405a" stroke-width="24" stroke-linecap="round"/>
  <circle cx="300" cy="205" r="86" fill="#fffdf8" stroke="#d6ece7" stroke-width="8"/>
  <g stroke="#172229" stroke-width="4" stroke-linecap="round">
    <line x1="300" y1="205" x2="300" y2="126"/>
    <line x1="300" y1="205" x2="356" y2="232"/>
  </g>
  <circle cx="300" cy="205" r="10" fill="#0f766e"/>
  <g fill="#5f6e73" font-family="Arial Narrow, sans-serif" font-size="16" letter-spacing="2">
    <text x="292" y="56">ZT0</text>
    <text x="507" y="212">ZT6</text>
    <text x="286" y="385">ZT12</text>
    <text x="73" y="212">ZT18</text>
  </g>
  <g fill="#172229" font-family="Arial Narrow, sans-serif" font-size="20" letter-spacing="2">
    <text x="256" y="28">LIGHT</text>
    <text x="262" y="412">DARK</text>
  </g>
  <path d="M82 330 C132 304 175 242 220 212 C260 186 315 184 358 214 C406 248 456 311 520 300" fill="none" stroke="#0f766e" stroke-width="10" stroke-linecap="round"/>
  <g fill="#172229" font-family="Palatino Linotype, Georgia, serif" font-size="22">
    <text x="72" y="82">24-hour timing</text>
    <text x="72" y="108">of physiology</text>
  </g>
</svg>
