<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" role="img" aria-labelledby="title desc">
  <title id="title">Abstract circadian network graphic</title>
  <desc id="desc">A minimal abstract graphic with a central circadian clock, concentric timing rings, and five surrounding nodes representing connected areas of the Hogenesch Lab research program.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef5fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1f4e79" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .ring { fill: none; stroke: #c7d8ea; stroke-width: 3; }
      .connector { fill: none; stroke: #9ab7d6; stroke-width: 4; stroke-linecap: round; }
      .hub { fill: #ffffff; stroke: #d6e2ef; stroke-width: 2; filter: url(#shadow); }
      .node { fill: #ffffff; stroke: #d6e2ef; stroke-width: 2; filter: url(#shadow); }
      .clock-ring { fill: none; stroke: #1f4e79; stroke-width: 12; }
      .clock-hand { stroke: #1f4e79; stroke-width: 8; stroke-linecap: round; }
      .dot-blue { fill: #1f4e79; }
      .dot-teal { fill: #2b7a78; }
      .dot-green { fill: #4d7c4a; }
      .dot-violet { fill: #5867a6; }
      .dot-gold { fill: #8a6d3b; }
    </style>
  </defs>

  <rect class="bg" width="920" height="760" rx="28"/>

  <circle class="ring" cx="460" cy="380" r="228"/>
  <circle class="ring" cx="460" cy="380" r="170" opacity="0.8"/>
  <circle class="ring" cx="460" cy="380" r="112" opacity="0.6"/>

  <path class="connector" d="M460 268 L460 184"/>
  <path class="connector" d="M566 316 L672 272"/>
  <path class="connector" d="M542 486 L606 582"/>
  <path class="connector" d="M378 486 L314 582"/>
  <path class="connector" d="M354 316 L248 272"/>

  <circle class="hub" cx="460" cy="380" r="112"/>
  <circle class="clock-ring" cx="460" cy="380" r="74"/>
  <line class="clock-hand" x1="460" y1="380" x2="460" y2="334"/>
  <line class="clock-hand" x1="460" y1="380" x2="494" y2="396"/>
  <circle class="dot-blue" cx="460" cy="380" r="8"/>

  <circle class="node" cx="460" cy="148" r="44"/>
  <circle class="dot-blue" cx="460" cy="148" r="14"/>

  <circle class="node" cx="714" cy="258" r="44"/>
  <circle class="dot-teal" cx="714" cy="258" r="14"/>

  <circle class="node" cx="618" cy="598" r="44"/>
  <circle class="dot-violet" cx="618" cy="598" r="14"/>

  <circle class="node" cx="302" cy="598" r="44"/>
  <circle class="dot-gold" cx="302" cy="598" r="14"/>

  <circle class="node" cx="206" cy="258" r="44"/>
  <circle class="dot-green" cx="206" cy="258" r="14"/>
</svg>
