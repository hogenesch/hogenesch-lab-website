<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" role="img" aria-labelledby="title desc">
  <title id="title">Five connected directions of the Hogenesch Lab research program</title>
  <desc id="desc">A conceptual diagram with a central circadian clock connected to five research directions: molecular clock, circadian biology, systems biology, computational methods and resources, and circadian medicine and rare disease.</desc>
  <defs>
    <linearGradient id="bgGlow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eef5fb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f4e79" flood-opacity="0.09"/>
    </filter>
  </defs>

  <rect width="920" height="760" rx="28" fill="url(#bgGlow)"/>

  <g opacity="0.35" fill="none" stroke="#c7d8ea" stroke-width="2">
    <circle cx="460" cy="380" r="228"/>
    <circle cx="460" cy="380" r="170"/>
  </g>

  <g fill="none" stroke="#9ab7d6" stroke-width="3" stroke-linecap="round">
    <path d="M460 240 L460 162"/>
    <path d="M604 336 L690 307"/>
    <path d="M550 506 L603 579"/>
    <path d="M370 506 L317 579"/>
    <path d="M316 336 L230 307"/>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="460" cy="380" r="112" fill="#ffffff" stroke="#d6e2ef" stroke-width="2"/>
    <circle cx="460" cy="380" r="76" fill="none" stroke="#1f4e79" stroke-width="10"/>
    <line x1="460" y1="380" x2="460" y2="332" stroke="#1f4e79" stroke-width="8" stroke-linecap="round"/>
    <line x1="460" y1="380" x2="494" y2="396" stroke="#1f4e79" stroke-width="8" stroke-linecap="round"/>
    <circle cx="460" cy="380" r="8" fill="#1f4e79"/>
    <text x="460" y="422" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#1a1a1a">Hogenesch Lab</text>
    <text x="460" y="446" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="13" fill="#5a5f66">Circadian timing across scales</text>
  </g>

  <g filter="url(#softShadow)">
    <g transform="translate(336 84)">
      <rect width="248" height="96" rx="22" fill="#ffffff" stroke="#d6e2ef" stroke-width="2"/>
      <rect x="18" y="18" width="36" height="36" rx="12" fill="#e6f0fb"/>
      <circle cx="36" cy="36" r="11" fill="none" stroke="#1f4e79" stroke-width="3"/>
      <path d="M36 36 L36 28 M36 36 L42 40" stroke="#1f4e79" stroke-width="3" stroke-linecap="round"/>
      <text x="72" y="41" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="21" font-weight="700" fill="#1a1a1a">Molecular Clock</text>
      <text x="72" y="67" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="13" fill="#5a5f66">BMAL1, NPAS2, feedback architecture</text>
    </g>

    <g transform="translate(650 246)">
      <rect width="226" height="96" rx="22" fill="#ffffff" stroke="#d6e2ef" stroke-width="2"/>
      <rect x="18" y="18" width="36" height="36" rx="12" fill="#e8f5f6"/>
      <path d="M28 45 C36 25, 48 25, 54 45" fill="none" stroke="#2b7a78" stroke-width="3" stroke-linecap="round"/>
      <path d="M24 40 C32 54, 50 54, 58 40" fill="none" stroke="#2b7a78" stroke-width="3" stroke-linecap="round"/>
      <text x="72" y="41" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#1a1a1a">Circadian Biology</text>
      <text x="72" y="67" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="13" fill="#5a5f66">Rhythms across tissues and organs</text>
    </g>

    <g transform="translate(554 560)">
      <rect width="282" height="96" rx="22" fill="#ffffff" stroke="#d6e2ef" stroke-width="2"/>
      <rect x="18" y="18" width="36" height="36" rx="12" fill="#edf1fb"/>
      <path d="M27 50 L35 34 L43 42 L51 26" fill="none" stroke="#5867a6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="27" cy="50" r="2.8" fill="#5867a6"/>
      <circle cx="35" cy="34" r="2.8" fill="#5867a6"/>
      <circle cx="43" cy="42" r="2.8" fill="#5867a6"/>
      <circle cx="51" cy="26" r="2.8" fill="#5867a6"/>
      <text x="72" y="41" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="700" fill="#1a1a1a">Circadian Medicine</text>
      <text x="72" y="67" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="13" fill="#5a5f66">Chronotherapy and rare disease</text>
    </g>

    <g transform="translate(82 560)">
      <rect width="288" height="96" rx="22" fill="#ffffff" stroke="#d6e2ef" stroke-width="2"/>
      <rect x="18" y="18" width="36" height="36" rx="12" fill="#f4efe5"/>
      <path d="M28 46 H53 M28 38 H53 M28 30 H53" stroke="#8a6d3b" stroke-width="3" stroke-linecap="round"/>
      <text x="72" y="41" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="700" fill="#1a1a1a">Methods and Resources</text>
      <text x="72" y="67" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="13" fill="#5a5f66">JTK_CYCLE, CYCLOPS, CircaDB, Gene Atlas</text>
    </g>

    <g transform="translate(46 246)">
      <rect width="238" height="96" rx="22" fill="#ffffff" stroke="#d6e2ef" stroke-width="2"/>
      <rect x="18" y="18" width="36" height="36" rx="12" fill="#eef5ea"/>
      <path d="M29 47 C34 32, 45 28, 55 30 C49 36, 47 49, 41 55 C35 53, 30 50, 29 47 Z" fill="none" stroke="#4d7c4a" stroke-width="3" stroke-linejoin="round"/>
      <text x="72" y="41" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#1a1a1a">Systems Biology</text>
      <text x="72" y="67" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="13" fill="#5a5f66">Genome-scale transcription and atlases</text>
    </g>
  </g>
</svg>
